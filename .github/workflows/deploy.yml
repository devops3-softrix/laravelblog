name: Internal VM Deployment Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Syntax Test
        run: |
          echo "🔍 Checking PHP syntax for errors..."
          # This will actively scan your file and break the build if a semicolon is missing
          php -l public/index.php

      - name: Deploy Fresh Code to Live Directory
        run: |
          echo "🚚 Syncing code from GitHub runner workspace to the live website path..."
          # Copies everything from the runner folder to your live folder, ignoring the runner folder itself
          rsync -av --delete --exclude='actions-runner' ./ /var/www/laravelblog.com-v1/

      - name: Local Container Deployment
        run: |
          echo "🚀 Restarting or reloading application containers..."
          # If your app runs on Docker containers, uncomment the lines below:
          # cd /var/www/laravelblog.com-v1
          # docker compose up -d --build