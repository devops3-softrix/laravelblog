name: Internal VM Deployment Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Syntax Test
        run: |
          echo "🔍 Scanning PHP files for syntax errors on host..."
          php -l public/index.php
  
      - name: Deploy Fresh Code to Live Directory
        run: |
          echo "🚚 Syncing code files safely to server..."
          # --chmod=D755,F644 ensures directories are 755 and files are 644 on destination
          rsync -av \
            --exclude='actions-runner' \
            --exclude='.git' \
            --exclude='.github' \
            --chmod=D755,F644 \
            ./ /var/www/laravelblog.com-v1/

      - name: Run Composer Install Inside Container
        run: |
          echo "🔍 Finding FrankenPHP container..."
          CONTAINER_ID=$(docker ps --filter "name=frankenphp_84" -q)

          if [ -z "$CONTAINER_ID" ]; then
            echo "❌ Error: FrankenPHP container is not running! Cannot execute dependencies installation."
            exit 1
          fi

          echo "📦 Executing Composer install inside container ($CONTAINER_ID)..."
          docker exec $CONTAINER_ID bash -c '
            cd /var/www/laravelblog.com-v1 &&
            composer install --no-dev --optimize-autoloader --no-interaction &&

            echo "🧹 Clearing compiled blade views..." &&
            php artisan view:clear
          '