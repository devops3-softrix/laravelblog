name: Internal VM Deployment Pipeline

on:
  push:
    branches:
      - main  # Triggers when you push to the main branch

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Syntax Test
        run: |
          echo "🔍 Scanning PHP files for syntax errors..."
          # Validates your entry file before doing anything else
          php -l public/index.php

      - name: Deploy Fresh Code to Live Directory
        run: |
          echo "🚚 Syncing code files safely to server..."
          # No --delete flag here. Your untracked files are completely safe.
          rsync -av --exclude='actions-runner' ./ /var/www/laravelblog.com-v1/

      - name: Update Composer Dependencies
        run: |
          echo "📦 Running composer installation..."
          cd /var/www/laravelblog.com-v1
          # Pulls down your packages without messing with local environment setups
          composer install --no-dev --optimize-autoloader --no-interaction